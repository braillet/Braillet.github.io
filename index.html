<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Braillet</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #ffffff;
            color: #1a1a1a;
            text-align: center;
        }

        .content-wrapper {
            padding: 20px;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            letter-spacing: 4px;
            font-weight: 700;
            text-transform: uppercase;
        }

        p {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 2.5rem;
            letter-spacing: 1px;
        }

        .insta-btn {
            display: inline-block;
            background-color: #000000;
            color: #ffffff;
            padding: 18px 40px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 4px;
            transition: all 0.3s ease;
            border: 2px solid #000000;
        }

        .insta-btn:hover {
            background-color: transparent;
            color: #000000;
        }

        footer {
            position: absolute;
            bottom: 30px;
            font-size: 0.8rem;
            color: #ccc;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="content-wrapper">
        <h1>BRAILLET</h1>
        <p>Innovation in every touch.</p>
        
        <a href="#" target="_blank" class="insta-btn">FOLLOW ON INSTAGRAM</a>
    </div>

    <footer>
        &copy; 2026 BRAILLET
    </footer>

</body>
</html>
